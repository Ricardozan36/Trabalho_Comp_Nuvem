<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudTask AI - Dashboard</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #202024;
            --primary: #8257e5;
            --primary-hover: #996dff;
            --text-main: #e1e1e6;
            --text-sec: #a8a8b3;
            --border: #323238;
            --success: #04d361;
            --warning: #eba417;
            --danger: #e83f5b;
        }

        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background-color: var(--card-bg); border-bottom: 1px solid var(--border); }
        header h2 { margin: 0; color: var(--text-main); }
        header h2 span { color: var(--primary); }

        .user-info { display: flex; align-items: center; gap: 15px; }
        .btn-sair { background-color: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: all 0.2s; }
        .btn-sair:hover { background-color: var(--danger); color: white; }

        main { padding: 30px 40px; max-width: 1200px; margin: 0 auto; }

        .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background-color: var(--card-bg); padding: 20px; border-radius: 8px; border: 1px solid var(--border); border-left: 4px solid var(--primary); }
        .card h3 { margin: 0 0 10px 0; font-size: 16px; color: var(--text-sec); }
        .card p { margin: 0; font-size: 28px; font-weight: bold; }

        .section-box { background-color: var(--card-bg); padding: 25px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 30px; }
        .section-title { margin-top: 0; margin-bottom: 20px; color: var(--primary); font-size: 18px; display: flex; align-items: center; gap: 10px; }

        .upload-area { border: 2px dashed var(--border); border-radius: 8px; padding: 40px; text-align: center; color: var(--text-sec); margin-bottom: 20px; cursor: pointer; transition: border-color 0.2s; }
        .upload-area:hover { border-color: var(--primary); }

        input, select { padding: 12px; background-color: var(--bg-color); border: 1px solid var(--border); border-radius: 4px; color: var(--text-main); outline: none; }
        .btn-primary { background-color: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-warning { background-color: var(--warning); color: white; border: none; padding: 12px 24px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        .new-task-form { display: flex; gap: 15px; align-items: center; }
        .new-task-form input { flex: 1; }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--text-sec); font-weight: normal; }
        .status-pendente { color: var(--warning); }
        .status-concluida { color: var(--success); }
    </style>
</head>
<body>

    <header>
        <h2>CloudTask <span>AI</span></h2>
        <div class="user-info">
            <span id="userEmail">usuario@uninter.com</span>
            <button class="btn-sair" onclick="sair()">Sair</button>
        </div>
    </header>

    <main>
        <div class="summary-cards">
            <div class="card"><h3>Tasks Totais</h3><p id="totalTasks">0</p></div>
            <div class="card"><h3>Uploads no S3</h3><p id="totalUploads">0</p></div>
            <div class="card"><h3 style="color: var(--success);">Status da API</h3><p>Online 🟢</p></div>
        </div>

        <div class="section-box">
            <h3 class="section-title">☁️ Upload para S3</h3>
            <div class="upload-area" id="dropZone">
                <p>📁 Clique para selecionar um arquivo<br>ou arraste e solte aqui</p>
                <input type="file" id="fileInput" style="display: none;">
            </div>
            <button class="btn-primary" onclick="fazerUpload()">Enviar para S3</button>
        </div>

        <div class="section-box">
            <h3 class="section-title">➕ Criar Nova Tarefa</h3>
            <div class="new-task-form">
                <input type="text" id="taskTitle" placeholder="Ex: Configurar VPC na AWS...">
                <select id="taskPriority">
                    <option value="Baixa">Baixa</option>
                    <option value="Média" selected>Média</option>
                    <option value="Alta">Alta</option>
                </select>
                <button class="btn-primary" onclick="adicionarTarefa()">Adicionar Tarefa</button>
            </div>
        </div>

        <div class="section-box">
            <h3 class="section-title">📋 Últimas Tasks</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Tarefa</th>
                        <th>Prioridade</th>
                        <th>Status</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="tabelaTarefas"></tbody>
            </table>
        </div>
    </main>

    <script>
        const API_URL = 'http://localhost:8000';

        document.addEventListener('DOMContentLoaded', () => {
            carregarTarefas();
            document.querySelector('.upload-area').addEventListener('click', () => document.getElementById('fileInput').click());
        });

        async function carregarTarefas() {
            try {
                const response = await fetch(`${API_URL}/tasks`);
                const tarefas = await response.json();
                const tabelaBody = document.getElementById('tabelaTarefas');
                tabelaBody.innerHTML = '';
                document.getElementById('totalTasks').innerText = tarefas.length;

                tarefas.forEach(tarefa => {
                    const linha = document.createElement('tr');
                    
                    // Lógica para definir status e botão correspondente
                    const isDone = tarefa.status === 'done';
                    const statusTxt = isDone ? '✅ Concluída' : '⏳ Pendente';
                    const statusClass = isDone ? 'status-concluida' : 'status-pendente';
                    
                    // Define o botão baseado no estado
                    const botaoAcao = isDone 
                        ? `<button class="btn-primary" style="padding: 5px 10px; background-color: var(--warning);" onclick="alterarStatus(${tarefa.id}, 'pending')">Reabrir</button>`
                        : `<button class="btn-primary" style="padding: 5px 10px;" onclick="alterarStatus(${tarefa.id}, 'done')">Concluir</button>`;

                    linha.innerHTML = `
                        <td>${tarefa.id}</td>
                        <td>${tarefa.title}</td>
                        <td>${tarefa.priority}</td>
                        <td class="${statusClass}">${statusTxt}</td>
                        <td>${botaoAcao}</td>
                    `;
                    tabelaBody.appendChild(linha);
                });
            } catch (err) { console.error(err); }
        }

        async function adicionarTarefa() {
            const title = document.getElementById('taskTitle').value;
            const priority = document.getElementById('taskPriority').value;
            const traduzir = { 'Baixa': 'low', 'Média': 'medium', 'Alta': 'high' };

            await fetch(`${API_URL}/tasks`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, priority: traduzir[priority], status: 'pending' })
            });
            carregarTarefas();
        }

        // Função genérica que agora aceita o status que queremos definir
        async function alterarStatus(taskId, novoStatus) {
            await fetch(`${API_URL}/tasks/${taskId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: novoStatus })
            });
            carregarTarefas();
        }

        async function fazerUpload() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return alert('Selecione um arquivo.');
            const formData = new FormData();
            formData.append('file', file);
            await fetch(`${API_URL}/uploads/`, { method: 'POST', body: formData });
            alert('Upload realizado!');
        }

        function sair() { window.location.href = 'login.html'; }
    </script>
</body>
</html>
