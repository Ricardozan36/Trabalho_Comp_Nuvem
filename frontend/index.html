<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudTask AI - Login</title>
    <style>
        body {
            background-color: #121214; 
            color: #e1e1e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background-color: #202024;
            padding: 40px;
            border-radius: 8px; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 320px;
            border-top: 4px solid #8257e5;
        }

        .login-card h1 {
            color: #e1e1e6;
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 26px;
            letter-spacing: 1px;
        }

        .login-card h1 span { color: #8257e5; }

        .login-card p {
            color: #a8a8b3;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 15px;
            background-color: #121214;
            border: 1px solid #323238;
            border-radius: 4px;
            color: #c4c4cc;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: #8257e5;
            box-shadow: 0 0 0 1px #8257e5;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #8257e5;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover { background-color: #996dff; }
        button:active { transform: scale(0.98); }

        #msgErro { color: #e83f5b; font-size: 14px; margin-top: 15px; min-height: 20px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>CloudTask <span>AI</span></h1>
        <p>Sua rotina na nuvem,<br>mais inteligente.</p>

        <div id="msgErro"></div>

        <input type="text" placeholder="Usuário" id="userInput">
        <input type="password" placeholder="Sua senha" id="senhaInput">

        <button onclick="fazerLogin()">Acessar Plataforma</button>
    </div>

    <script>
        async function fazerLogin() {
            const username = document.getElementById('userInput').value;
            const password = document.getElementById('senhaInput').value;
            const msgErro = document.getElementById('msgErro');

            if (!username || !password) {
                msgErro.innerText = "Preencha usuário e senha.";
                return;
            }

            const formData = new URLSearchParams();
            formData.append('username', username);
            formData.append('password', password);

            try {
                // Rota correta validada pelo seu backend
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('userEmail', username);
                    window.location.assign('dashboard.html?cachebuster=' + new Date().getTime());
                } else {
                    msgErro.innerText = 'Login inválido.';
                }
            } catch (error) {
                console.error('Erro:', error);
                msgErro.innerText = 'Erro ao conectar.';
            }
        }
    </script>
</body>
</html>
