<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudTask AI - Cadastro</title>
    <style>
        body {
            background-color: #121214; 
            color: #e1e1e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background-color: #202024;
            padding: 40px;
            border-radius: 8px; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 320px;
            border-top: 4px solid #8257e5;
        }

        .login-card h1 {
            color: #e1e1e6;
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 26px;
            letter-spacing: 1px;
        }

        .login-card h1 span { color: #8257e5; }

        .login-card p {
            color: #a8a8b3;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 15px;
            background-color: #121214;
            border: 1px solid #323238;
            border-radius: 4px;
            color: #c4c4cc;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: #8257e5;
            box-shadow: 0 0 0 1px #8257e5;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #8257e5;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-bottom: 20px;
        }

        button:hover { background-color: #996dff; }
        button:active { transform: scale(0.98); }

        .register-link { color: #a8a8b3; font-size: 14px; }
        
        /* Ajuste para o link <a> ficar idêntico ao span original */
        .register-link a { 
            color: #8257e5; 
            cursor: pointer; 
            font-weight: bold; 
            text-decoration: none;
        }
        .register-link a:hover { 
            color: #996dff; 
            text-decoration: underline; 
        }

        #msgErro { color: #e83f5b; font-size: 14px; margin-bottom: 15px; min-height: 20px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>CloudTask <span>AI</span></h1>
        <p>Crie sua conta para<br>acessar a plataforma.</p>

        <div id="msgErro"></div>

        <input type="email" placeholder="E-mail de acesso" id="emailInput">
        <input type="password" placeholder="Crie sua senha" id="senhaInput">

        <button onclick="criarConta()">Cadastrar</button>

        <div class="register-link">
            Já tem conta? <a href="index.html" onclick="window.location.assign('index.html?cachebuster=' + new Date().getTime()); return false;">Faça login</a>
        </div>
    </div>

    <script>
        async function criarConta() {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('senhaInput').value;
            const msgErro = document.getElementById('msgErro');

            if (!email || !password) {
                msgErro.innerText = "Preencha e-mail e senha.";
                return;
            }

            try {
                // Ajuste 1: Adicionado o prefixo /api/auth/ para passar pelo proxy do Caddy
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: email, email: email, password: password })
                });

                if (!response.ok) {
                    const err = await response.json();
                    let textoErro = "Erro ao criar conta.";
                    
                    if (err.detail) {
                        if (typeof err.detail === 'string') {
                            textoErro = err.detail;
                        } 
                        else if (Array.isArray(err.detail)) {
                            textoErro = err.detail[0].msg; 
                        }
                    }
                    
                    throw new Error(textoErro);
                }

                alert("Conta criada com sucesso! Faça o login.");
                // Ajuste 2: Cachebuster no redirecionamento para garantir que o SPA não bloqueie a volta
                window.location.assign('index.html?cachebuster=' + new Date().getTime());
            } catch (err) {
                msgErro.innerText = err.message;
            }
        }
    </script>
</body>
</html>
