<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudTask AI - Login</title>
    <style>
        body { background-color: #121214; color: #e1e1e6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background-color: #202024; padding: 40px; border-radius: 8px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5); text-align: center; width: 320px; border-top: 4px solid #8257e5; }
        .login-card h1 { color: #e1e1e6; margin-top: 0; margin-bottom: 5px; font-size: 26px; letter-spacing: 1px; }
        .login-card h1 span { color: #8257e5; }
        .login-card p { color: #a8a8b3; font-size: 14px; margin-bottom: 30px; line-height: 1.5; }
        input { width: 100%; padding: 12px 14px; margin-bottom: 15px; background-color: #121214; border: 1px solid #323238; border-radius: 4px; color: #c4c4cc; box-sizing: border-box; outline: none; transition: all 0.3s; }
        input:focus { border-color: #8257e5; box-shadow: 0 0 0 1px #8257e5; }
        button { width: 100%; padding: 14px; background-color: #8257e5; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background-color 0.2s, transform 0.1s; margin-bottom: 20px; }
        button:hover { background-color: #996dff; }
        button:active { transform: scale(0.98); }
        .register-link { color: #a8a8b3; font-size: 14px; }
        .register-link span { color: #8257e5; cursor: pointer; font-weight: bold; }
        .register-link span:hover { color: #996dff; text-decoration: underline; }
        #msgErro { color: #e83f5b; font-size: 14px; margin-bottom: 15px; min-height: 20px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>CloudTask <span>AI</span></h1>
        <p>Sua rotina na nuvem,<br>mais inteligente.</p>

        <div id="msgErro"></div>

        <input type="email" placeholder="E-mail de acesso" id="emailInput">
        <input type="password" placeholder="Sua senha" id="senhaInput">

        <button id="btnAcao" onclick="executarAcao()">Acessar Plataforma</button>

        <div class="register-link">
            Novo por aqui? <span id="linkAlternar" onclick="alternarModo()">Crie sua conta</span>
        </div>
    </div>

    <script>
        const API_URL = '';
        let modoLogin = true;

        function alternarModo() {
            modoLogin = !modoLogin;
            document.getElementById('btnAcao').innerText = modoLogin ? 'Acessar Plataforma' : 'Criar Conta';
            document.querySelector('.register-link').innerHTML = modoLogin 
                ? `Novo por aqui? <span onclick="alternarModo()">Crie sua conta</span>`
                : `Já tem conta? <span onclick="alternarModo()">Faça login</span>`;
            document.getElementById('msgErro').innerText = '';
        }

        async function executarAcao() {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('senhaInput').value;
            const msgErro = document.getElementById('msgErro');

            if (!email || !password) {
                msgErro.innerText = "Preencha e-mail e senha.";
                return;
            }

            try {
                if (modoLogin) {
                    // Lógica de LOGIN: Recebe o Token
                    const formData = new URLSearchParams();
                    formData.append('username', email);
                    formData.append('password', password);

                    const response = await fetch(`${API_URL}/token`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: formData
                    });

                    if (!response.ok) throw new Error("E-mail ou senha incorretos.");
                    
                    const data = await response.json();
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('userEmail', email);
                    
                    window.location.href = 'dashboard.html';

                } else {
                    // Lógica de CRIAR CONTA
                    const response = await fetch(`${API_URL}/signup`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: email, password: password })
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.detail || "Erro ao criar conta.");
                    }

                    alert("Conta criada com sucesso! Faça o login.");
                    alternarModo();
                }
            } catch (err) {
                msgErro.innerText = err.message;
            }
        }
    </script>
</body>
</html>
