# =============================================================================
# configmap.yaml — configurações NÃO sensíveis (texto puro, OK no Git).
# -----------------------------------------------------------------------------
# POR QUÊ ConfigMap (e não Secret) para essas chaves: não há segredo aqui.
# Hostname interno do Postgres, modo de storage, log level — são decisões
# arquiteturais, podem ficar visíveis no `kubectl describe`.
#
# REGRA DIDÁTICA: tudo que você não se importaria de imprimir no terminal
# vai em ConfigMap; tudo que vazaria credencial vai em Secret.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudtask-config
  namespace: cloudtask
data:
  APP_ENV: "production"
  LOG_LEVEL: "INFO"
  APP_PORT: "8000"

  # Hostname do Postgres = nome do Service (DNS interno do K8s).
  # K8s resolve `postgres.cloudtask.svc.cluster.local` automaticamente.
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "cloudtask"

  # Modo de upload — Ajustado para S3
  STORAGE_MODE: "s3"
  LOCAL_UPLOADS_DIR: "uploads_dir"
  AWS_REGION: "us-east-1"
  S3_BUCKET_NAME: "cloudtask-uploads-ricar-1782259933" # ATENÇÃO: Substitua pelo nome real do seu bucket criado na AWS

  # HTTPS desligado: dev local Kind sem ALB.
  FORCE_HTTPS: "false"
  BEHIND_PROXY: "false"
  TRUSTED_HOSTS: "*"