apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudtask-api # Corrigido para o nome que o seu cluster reconhece
  namespace: cloudtask
  labels: { app: api, component: backend }
spec:
  replicas: 2
  selector:
    matchLabels: { app: api }
  template:
    metadata:
      labels: { app: api, component: backend }
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command: ["sh", "-c", "until pg_isready -h postgres -p 5432 -U \"$POSTGRES_USER\"; do echo \"esperando postgres...\"; sleep 2; done;"]
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef: { name: cloudtask-secrets, key: POSTGRES_USER }
      containers:
        - name: api
          image: cloudtask-api:prod
          imagePullPolicy: Never
          command: ["uvicorn"]
          args: ["app.main:app", "--host", "0.0.0.0", "--port", "8000"]
          env:
            - name: PYTHONPATH
              value: "/app"
          envFrom:
            - configMapRef: { name: cloudtask-config } # Certifique-se que o nome é cloudtask-config
            - secretRef: { name: cloudtask-secrets }   # Injeta tudo do Secret como variável de ambiente
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet: { path: /health/ready, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 15